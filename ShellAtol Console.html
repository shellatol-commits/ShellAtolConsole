<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShellAtol Console</title>

<style>
body {
    background-color: black;
    color: #00ff00;
    font-family: monospace;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

#header {
    padding: 10px;
}

#console {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    white-space: pre-wrap;
}

#input-area {
    display: flex;
    padding: 10px;
}

#footer {
    padding: 10px;
    font-size: 12px;
    opacity: 0.7;
}

.prompt {
    white-space: nowrap;
}

input {
    background: black;
    border: none;
    color: #00ff00;
    font-family: monospace;
    outline: none;
    width: 100%;
}
</style>
</head>

<body>

<div id="header">ShellAtolCONSOLE v1.0.0.</div>

<div id="console"></div>

<div id="input-area">
    <span class="prompt">ShellAtolCONSOLE>>[</span>
    <input type="text" id="input">
</div>

<div id="footer">Copyright ShellAtol 2026 Software Developer</div>

<script>
const input = document.getElementById("input");
const consoleDiv = document.getElementById("console");

// ALWAYS keep focus (fixes non-typeable bug)
document.addEventListener("click", () => input.focus());
input.focus();

function runCommand(cmd) {

    consoleDiv.innerHTML += "ShellAtolCONSOLE>>[" + cmd + "\n";

    if (cmd === "help") {
        consoleDiv.innerHTML +=
`Commands:
help
clear
echo
time
date
version
about
whoami
random
calc
upper
lower
reverse
color
bg
\n`;
    }

    else if (cmd === "clear") {
        consoleDiv.innerHTML = "";
        return;
    }

    else if (cmd.startsWith("echo ")) {
        consoleDiv.innerHTML += cmd.slice(5) + "\n";
    }

    else if (cmd.startsWith("upper ")) {
        consoleDiv.innerHTML += cmd.slice(6).toUpperCase() + "\n";
    }

    else if (cmd.startsWith("lower ")) {
        consoleDiv.innerHTML += cmd.slice(6).toLowerCase() + "\n";
    }

    else if (cmd.startsWith("reverse ")) {
        consoleDiv.innerHTML += cmd.slice(8).split("").reverse().join("") + "\n";
    }

    else if (cmd === "time") {
        consoleDiv.innerHTML += new Date().toLocaleTimeString() + "\n";
    }

    else if (cmd === "date") {
        consoleDiv.innerHTML += new Date().toLocaleDateString() + "\n";
    }

    else if (cmd === "version") {
        consoleDiv.innerHTML += "ShellAtol v1.0.0\n";
    }

    else if (cmd === "about") {
        consoleDiv.innerHTML += "ShellAtol Web Console System\n";
    }

    else if (cmd === "whoami") {
        consoleDiv.innerHTML += "guest\n";
    }

    else if (cmd === "random") {
        consoleDiv.innerHTML += Math.floor(Math.random() * 100) + "\n";
    }

    else if (cmd.startsWith("calc ")) {
        try {
            let result = eval(cmd.slice(5));
            consoleDiv.innerHTML += result + "\n";
        } catch {
            consoleDiv.innerHTML += "Invalid calculation\n";
        }
    }

    else if (cmd.startsWith("color ")) {
        document.body.style.color = cmd.slice(6);
        consoleDiv.innerHTML += "Text color changed\n";
    }

    else if (cmd.startsWith("bg ")) {
        document.body.style.backgroundColor = cmd.slice(3);
        consoleDiv.innerHTML += "Background changed\n";
    }

    else {
        consoleDiv.innerHTML += "Unknown command\n";
    }

    consoleDiv.innerHTML += "\n";
    consoleDiv.scrollTop = consoleDiv.scrollHeight;
}

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();

        const value = input.value.trim();

        if (value !== "") {
            runCommand(value);
        }

        input.value = "";
    }
});
</script>

</body>
</html>
