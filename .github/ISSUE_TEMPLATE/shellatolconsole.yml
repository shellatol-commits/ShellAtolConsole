name: ShellAtolConsole Issue
description: Report a bug or request a feature
title: "[ShellAtolConsole]"
labels:
  - shellatolconsole

body:
  - type: input
    id: summary
    attributes:
      label: Summary
    validations:
      required: true

  * type: textarea
  id: logs
  attributes:
  label: Logs / Output
  description: Paste any relevant logs or console output here
  placeholder: |
  Example:
  [INFO] Starting ShellAtolConsole...
  [ERROR] Something failed...
  render: shell
  validations:
  required: false

