name: ShellAtolConsole Issue
description: Report a bug, request a feature, or improve ShellAtolConsole
title: "[ShellAtolConsole]: "
labels: ["shellatolconsole"]
assignees: []

body:

* type: markdown
  attributes:
  value: |
  ## ShellAtolConsole Issue Template
  Please fill out the details below to help us understand your request.

* type: input
  id: summary
  attributes:
  label: Summary
  description: Briefly describe the issue or feature request
  placeholder: Short description here...
  validations:
  required: true

* type: dropdown
  id: issue_type
  attributes:
  label: Type of Issue
  description: What kind of issue are you reporting?
  options:
  - Bug
  - Feature Request
  - Improvement
  - Documentation
  validations:
  required: true

* type: textarea
  id: description
  attributes:
  label: Detailed Description
  description: Provide a clear and detailed explanation
  placeholder: Explain what is happening or what you want...
  validations:
  required: true

* type: textarea
  id: steps
  attributes:
  label: Steps to Reproduce (for bugs)
  description: How can we reproduce this issue?
  placeholder: |
  1. Run command...
  2. Observe output...
  validations:
  required: false

* type: textarea
  id: expected
  attributes:
  label: Expected Behavior
  description: What did you expect to happen?
  validations:
  required: false

* type: textarea
  id: actual
  attributes:
  label: Actual Behavior
  description: What actually happened?
  validations:
  required: false

* type: input
  id: environment
  attributes:
  label: Environment
  description: OS, runtime, version, etc.
  placeholder: e.g. Windows 11, .NET 8
  validations:
  required: false

* type: textarea
  id: additional
  attributes:
  label: Additional Context
  description: Add any other context, logs, or screenshots
  validations:
  required: false
